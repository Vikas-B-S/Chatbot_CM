version: "3.9"

services:
  neo4j:
    image: neo4j:5
    container_name: chatbot_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: chatbot_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chatbot:
    build: .
    container_name: chatbot_api
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${OPENROUTER_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: chatbot
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SQLITE_DB_PATH: /data/chatbot.db
      MAX_RAW_TURNS: 6
      SUMMARIZE_AT_TURN: 6
      SUMMARIZE_BATCH: 3
    volumes:
      - chatbot_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  neo4j_data:
  mongo_data:
  redis_data:
  chatbot_data:
